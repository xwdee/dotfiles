#########################################
### xwdee's Catppuccin Hyprland Theme ###
#########################################


#####################
### COLOR PALLETE ###
#####################
source=~/.config/hypr/hyprmocha.conf

################
### MONITORS ###
################
monitor=eDP-1,1920x1080@144,0x0,1

################
### PROGRAMS ###
################
source=~/.config/hypr/hyprprogs.conf

#################
### AUTOSTART ###
#################
source=~/.config/hypr/hyprload.conf

###################
### KEYBINDINGS ###
###################
source=~/.config/hypr/hyprbinds.conf

#############################
### ENVIRONMENT VARIABLES ###
#############################
source=~/.config/hypr/hyprenvs.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
source=~/.config/hypr/hyprwindows.conf
source=~/.config/hypr/hyprspaces.conf

#####################
### LOOK AND FEEL ###
#####################
general {
	gaps_in			=	5
	gaps_out		=	5
	border_size		=	2
	col.active_border	=	$blue #base $base $blue 45deg
	col.inactive_border	=	$blue #base $base $blue 45deg
	resize_on_border	=	true
	allow_tearing		=	false
	layout			=	dwindle
}

decoration {
	rounding		=	10
	active_opacity		=	1.0
	inactive_opacity	=	1.0
	shadow {
		enabled		=	true
		range		=	4
		render_power	=	3
		color		=	$crust
	}
	blur {
		enabled		=	true
		size		=	3
		passes		=	3
		vibrancy	=	0.1696
	}
}

animations {
	enabled			=	true
	bezier			=	easeCubic, 0.05, 0.9, 0.1, 1.05
	bezier			=	easeInCubic, 0.1, 1.1, 0.1, 1.1
	bezier			=	easeOutQuint, 0.3, -0.3, 0, 1
	bezier			=	linear, 1, 1, 1, 1
	bezier			=	almostLinear, 0.5, 0.5, 0.75, 1.0
	bezier			=	quick, 0.15, 0, 0.1, 1
	animation		=	global, 1, 10, default
	animation		=	border, 1, 1, linear
	animation		=	borderangle, 1, 1, linear, loop
	animation		=	windows, 1, 6, easeCubic, popin 87%
	animation		=	windowsIn, 1, 6, easeInCubic, popin 87%
	animation		=	windowsOut, 1, 5, easeOutQuint, popin 87%
	animation		=	fadeIn, 1, 1.73, almostLinear
	animation		=	fadeOut, 1, 1.46, almostLinear
	animation		=	fade, 1, 3.03, quick
	animation		=	layers, 1, 3.81, easeOutQuint
	animation		=	layersIn, 1, 4, easeOutQuint, fade
	animation		=	layersOut, 1, 1.5, linear, fade
	animation		=	fadeLayersIn, 1, 1.79, almostLinear
	animation		=	fadeLayersOut, 1, 1.39, almostLinear
	animation		=	workspaces, 1, 1.94, almostLinear, fade
	animation		=	workspacesIn, 1, 1.21, almostLinear, fade
	animation		=	workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
	pseudotile		=	true
	preserve_split		=	true
}

master {
}

misc {
	force_default_wallpaper	=	0
	disable_hyprland_logo	=	true
	disable_splash_rendering=	true
	vrr			=	0
}


#############
### INPUT ###
#############
input {
	kb_layout		=	us, ua, ru
	kb_variant		=
	kb_model		=
	kb_options		=
	kb_rules		=
	follow_mouse		=	1
	sensitivity		=	0
	touchpad {
		natural_scroll	=	false
	}
}

gestures {
	workspace_swipe		=	false
}

device {
	name			=	sinowealth-game-mouse
	sensitivity		=	-0.5
}
